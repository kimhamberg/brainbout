pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,js,json}"
      run: bunx biome check {staged_files}

    - name: tsc
      glob: "*.ts"
      run: bunx tsc --noEmit

    - name: stylelint
      glob: "*.css"
      run: bunx stylelint {staged_files}

    - name: superhtml
      glob: "*.html"
      run: superhtml check {staged_files}

    - name: actionlint
      glob: ".github/workflows/*.yml"
      run: actionlint

    - name: taplo
      glob: "*.toml"
      run: taplo lint {staged_files}

    - name: ktlint
      glob: "android/**/*.kt"
      run: ktlint {staged_files}

pre-push:
  jobs:
    - name: test
      run: bun test
