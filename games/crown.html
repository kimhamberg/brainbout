<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (!t)
          t = matchMedia("(prefers-color-scheme:light)").matches
            ? "latte"
            : "frappe";
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <title>Brainbout — Crown</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <style>
      :root {
        --game-accent: var(--ctp-green);
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/games/crown.css">
  </head>
  <body>
    <div class="page-enter-overlay" aria-hidden="true"></div>
    <div id="app" class="app">
      <header>
        <div class="app-title"><h1>Crown</h1></div>
        <div class="header-actions">
          <button
            class="quit-btn"
            id="quit-btn"
            aria-label="End session"
          ></button>
          <button
            class="theme-toggle"
            id="theme-btn"
            aria-label="Toggle theme"
          ></button>
        </div>
      </header>
      <main id="game" class="game"></main>
    </div>
    <script type="module" src="/src/games/crown.ts"></script>
  </body>
</html>
