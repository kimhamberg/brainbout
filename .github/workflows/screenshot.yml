name: Update screenshot

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SCREENSHOT_PAT }}
      - uses: ./.github/actions/setup
      - run: bunx playwright install --with-deps chromium
      - run: bun run screenshot

      - name: Push screenshot if changed
        run: |
          git diff --quiet docs/screenshot.png && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshot.png
          git commit -m "docs: update screenshot [skip ci]"
          git push origin master
