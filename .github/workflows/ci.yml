name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install external linters
        run: |
          sudo curl -fsSL https://github.com/kristoff-it/superhtml/releases/latest/download/superhtml-x86_64-linux -o /usr/local/bin/superhtml
          sudo chmod +x /usr/local/bin/superhtml
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz | gunzip | sudo tee /usr/local/bin/taplo > /dev/null
          sudo chmod +x /usr/local/bin/taplo
          sudo curl -sSL https://github.com/pinterest/ktlint/releases/latest/download/ktlint -o /usr/local/bin/ktlint
          sudo chmod +x /usr/local/bin/ktlint
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun run check
      - run: bun run lint:css
      - run: superhtml check index.html games/*.html
      - run: taplo lint
      - run: taplo fmt --check
      - run: ktlint "android/**/*.kt"
      - uses: docker://rhysd/actionlint:latest

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:cov

  fuzz:
    name: Fuzz (fast-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:fuzz

  mutation:
    name: Mutation (Stryker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:mutation
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/
