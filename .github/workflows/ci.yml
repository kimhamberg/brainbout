name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            android:
              - 'android/**'
      - uses: ./.github/actions/setup
      - uses: actions/setup-java@v4
        if: steps.changes.outputs.android == 'true'
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache linter binaries
        id: linters
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: linters-${{ hashFiles('.github/workflows/ci.yml') }}
      - name: Install linter binaries
        if: steps.linters.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://github.com/kristoff-it/superhtml/releases/latest/download/x86_64-linux-musl.tar.xz | tar -xJ -C ~/.local/bin
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz | gunzip > ~/.local/bin/taplo
          curl -fsSL https://github.com/pinterest/ktlint/releases/latest/download/ktlint -o ~/.local/bin/ktlint
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) latest ~/.local/bin
          chmod +x ~/.local/bin/*
      - run: echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: bunx tsc --noEmit
      - run: bun run check
      - run: bun run lint:css
      - run: superhtml check index.html games/*.html
      - run: taplo lint
      - run: taplo fmt --check
      - run: ktlint "android/**/*.kt"
        if: steps.changes.outputs.android == 'true'
      - run: actionlint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run test:cov

  fuzz:
    name: Fuzz (fast-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: FAST_CHECK_NUM_RUNS=10000 bun test test/property.test.ts
