name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: bun run build

      # Desktop binaries (cross-compiled via bun build --compile)
      - run: bun server/build.ts brainbout-linux-amd64
      - run: bun server/build.ts brainbout-windows-amd64.exe

      # Android APK
      - run: |
          rm -rf android/app/src/main/assets
          mkdir -p android/app/src/main/assets
          cp -r dist/* android/app/src/main/assets/
      - uses: gradle/actions/setup-gradle@v4
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      - run: cp android/app/build/outputs/apk/debug/app-debug.apk brainbout.apk

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            brainbout-linux-amd64
            brainbout-windows-amd64.exe
            brainbout.apk
          generate_release_notes: true
